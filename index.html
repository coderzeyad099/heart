<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قلب نابض مع صورتك</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a0110;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            z-index: 1;
        }

        /* --- تاغ الصورة في منتصف القلب --- */
        .image-wrapper {
            position: absolute;
            z-index: 10; /* فوق الـ Canvas */
            width: 200px; /* يمكنك تعديل الحجم من هنا */
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* لكي لا تعيق حركة الماوس إذا أضفت تفاعلاً */
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%; /* لجعلها دائرية */
            border: 3px solid rgba(255, 179, 193, 0.5);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
            /* تأثير نبض للصورة ليتماشى مع القلب */
            animation: pulse-img 2s infinite ease-in-out;
        }

        @keyframes pulse-img {
            0%, 100% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
        }

        .title {
            position: absolute;
            bottom: 40px;
            color: #ffb3c1;
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            text-align: center;
            z-index: 5;
        }

        /* تعديلات الموبايل */
        @media (max-width: 600px) {
            .image-wrapper { width: 220px; height: 220px; }
            .title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="image-wrapper">
            <img src="img.png" alt="صورة الحب">
        </div>

        <canvas id="heartCanvas"></canvas>
        <div class="title">كل نبضة تناديك..</div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let baseHeartSize;
        let heartPulse = 1;
        let pulseDirection = 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            baseHeartSize = canvas.width < 600 ? canvas.width * 0.035 : canvas.width * 0.022;
            initParticles();
        }

        function getHeartPoint(t, size) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * size, y: y * size };
        }

        class Particle {
            constructor(targetX, targetY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.color = `rgba(255, 77, 109, ${Math.random() * 0.5 + 0.5})`;
                this.speed = Math.random() * 0.03 + 0.01;
                this.targetX = targetX;
                this.targetY = targetY;
            }
            update() {
                const dx = (this.targetX - (canvas.width / 2)) * heartPulse + (canvas.width / 2);
                const dy = (this.targetY - (canvas.height / 2)) * heartPulse + (canvas.height / 2);
                this.x += (dx - this.x) * this.speed;
                this.y += (dy - this.y) * this.speed;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 1200; i++) {
                const t = Math.random() * Math.PI * 2;
                const point = getHeartPoint(t, baseHeartSize);
                particles.push(new Particle(point.x + canvas.width / 2, point.y + canvas.height / 2));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(26, 1, 16, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            heartPulse += 0.004 * pulseDirection;
            if (heartPulse > 1.1 || heartPulse < 0.9) pulseDirection *= -1;

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        animate();
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
